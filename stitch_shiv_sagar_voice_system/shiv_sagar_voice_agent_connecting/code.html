<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shiv Sagar | Voice Reservations</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..900&family=Libre+Caslon+Text:wght@100..900&family=Plus+Jakarta+Sans:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .mic-gradient {
            background: radial-gradient(circle, #fdba49 0%, #e8a838 100%);
        }

        .saffron-glow {
            box-shadow: 0 8px 32px rgba(232, 168, 56, 0.25);
        }

        @keyframes rotate-ring {
            0% { transform: rotate(0deg); stroke-dashoffset: 280; }
            50% { transform: rotate(180deg); stroke-dashoffset: 140; }
            100% { transform: rotate(360deg); stroke-dashoffset: 280; }
        }

        .loading-ring {
            stroke-dasharray: 283;
            transform-origin: center;
            animation: rotate-ring 2s linear infinite;
        }

        .paisley-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10c-15 0-25 15-25 25 0 20 25 45 25 45s25-25 25-45c0-10-10-25-25-25z' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: bottom right;
        }

        .ghost-line {
            height: 1px;
            background: linear-gradient(90deg, rgba(213, 196, 175, 0.06) 0%, rgba(213, 196, 175, 0.02) 100%);
        }
    </style>

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-gutter">
<!-- Top Navigation (Shell suppressed for focused task but header remains part of component) -->
<main class="w-full max-w-[480px] h-[720px] bg-surface-container rounded-xl overflow-hidden flex flex-col relative shadow-2xl border border-white/5 paisley-bg">
<!-- Header -->
<header class="flex flex-col items-center pt-lg px-gutter gap-xs">
<h1 class="font-display-logo text-primary text-[28px]">Shiv Sagar</h1>
<div class="flex items-center gap-base">
<span class="font-headline-sm text-on-surface text-sm opacity-80 uppercase tracking-widest">Voice Reservations</span>
<span class="bg-primary-container/20 text-primary text-[10px] font-label-caps px-2 py-0.5 rounded-full border border-primary/20">IST 14:22</span>
</div>
</header>
<!-- Status Area -->
<div class="mt-lg px-gutter text-center flex flex-col gap-xs">
<h2 class="text-primary font-headline-sm text-lg">Connecting to agent...</h2>
<p class="text-on-surface-variant font-body-sm">Requesting microphone access…</p>
</div>
<!-- Center: Mic Section -->
<div class="flex-grow flex flex-col items-center justify-center relative">
<div class="relative flex items-center justify-center w-64 h-64">
<!-- Progress Ring -->
<svg class="absolute w-full h-full" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="transparent" r="45" stroke="rgba(232, 168, 56, 0.1)" stroke-width="2"></circle>
<circle class="loading-ring" cx="50" cy="50" fill="transparent" r="45" stroke="#e8a838" stroke-linecap="round" stroke-width="2"></circle>
</svg>
<!-- Mic Button -->
<button class="w-[120px] h-[120px] rounded-full mic-gradient saffron-glow flex items-center justify-center text-on-primary-fixed active:scale-95 transition-transform z-10">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<p class="text-on-surface-variant font-body-sm opacity-60 max-w-[200px] text-center mt-md leading-relaxed">
                Allow microphone access when your browser prompts you
            </p>
</div>
<!-- Transcript Ghost Area -->
<div class="px-lg pb-lg flex flex-col gap-sm">
<div class="ghost-line w-3/4 rounded-full"></div>
<div class="ghost-line w-1/2 rounded-full"></div>
<div class="ghost-line w-2/3 rounded-full"></div>
</div>
<!-- Footer Decoration -->
<footer class="p-base flex justify-center opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-primary text-xl">water_lux</span>
</footer>
<!-- Micro-interaction overlay for feedback -->
<div class="absolute inset-0 bg-primary/5 pointer-events-none opacity-0 transition-opacity duration-1000" id="connecting-overlay"></div>
</main>
<script>
        // Subtle atmospheric breathing effect
        const overlay = document.getElementById('connecting-overlay');
        let opacity = 0;
        let direction = 1;

        function breathe() {
            opacity += 0.002 * direction;
            if (opacity > 0.08 || opacity < 0) direction *= -1;
            overlay.style.opacity = opacity;
            requestAnimationFrame(breathe);
        }
        breathe();

        // Simple feedback on mic click
        const micBtn = document.querySelector('button');
        micBtn.addEventListener('click', () => {
            console.log('User attempting to grant permission early');
        });
    </script>
</body></html>
